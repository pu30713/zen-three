<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>金剛經刷題小程序</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --main-color-light: #D4AF37;
      --main-color-dark: #8B6914;
      --accent-yellow: #FFF8DC;
      --bg-color: #F9F9F7;
      --text-dark: #4A4A4A;
      --wrong-bg: #F9EBEB;
      --wrong-color: #D9534F;
    }

    body {
      font-family: 'Noto Serif TC', serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      margin: 0;
      padding: 10px; 
      text-align: center;
      line-height: 1.4;
      font-size: 18px;
      display: flex;
      flex-direction: column;
      height: 100vh; 
      box-sizing: border-box;
      overflow: hidden; 
    }

    @media screen and (min-width: 768px) {
      body { max-width: 900px; margin: 0 auto; height: auto; overflow: auto; padding: 24px 20px; display: block; }
      #unit-list { height: auto !important; grid-template-rows: auto !important; }
      .unit-card { min-height: 140px !important; }
    }

    input, select, button { box-sizing: border-box; outline: none; }
    .sans-font { font-family: 'Noto Sans TC', sans-serif; }

    /* 按鈕樣式 */
    .btn-main {
      background-color: var(--main-color-dark); color: #fff; border: none; padding: 14px;
      font-size: 20px; border-radius: 50px; cursor: pointer; width: 100%;
      max-width: 350px; margin: 20px auto; display: block;
      box-shadow: 0 4px 8px rgba(139, 105, 20, 0.3);
    }
    
    /* 副按鈕 */
    .btn-sub {
      background-color: transparent; border: 2px solid var(--main-color-dark); color: var(--main-color-dark);
      padding: 10px; font-size: 18px; border-radius: 50px; cursor: pointer; width: 100%;
      max-width: 350px; margin: 0 auto; display: block; font-weight: bold;
      background: #fff;
    }

    /* 登入頁 */
    .app-title { font-size: 32px; color: var(--main-color-dark); font-weight: bold; margin: 20px 0 30px; letter-spacing: 2px; }
    input, select {
      font-family: 'Noto Sans TC'; font-size: 20px; padding: 12px; width: 100%;
      max-width: 350px; margin: 10px auto; border: 1px solid #ccc; border-radius: 10px; display: block; background: #fff;
    }

    /* 頁面切換 */
    .page { display: none; width: 100%; }
    .page.active { display: block; }

    /* 選單頁 (Menu) */
    #menu-page { height: 100%; flex-direction: column; }
    #menu-page.active { display: flex; }

    #unit-list {
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); 
      gap: 12px; margin: 10px auto; width: 100%; max-width: 600px; height: 100%; 
      padding-bottom: 5px; box-sizing: border-box; flex-grow: 1;
    }

    .unit-card {
      background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer;
      display: flex; flex-direction: column; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      transition: all 0.1s; border: 1px solid #E0E0E0; height: 100%; 
    }
    .unit-card:active { transform: scale(0.97); }

    .unit-head { background: linear-gradient(135deg, #E6C75A, #D4AF37); flex: 1; display: flex; align-items: center; justify-content: center; }
    .unit-no { font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 36px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.2); line-height: 1; }
    .unit-body { background: #fff; flex: 1; display: flex; align-items: center; justify-content: center; padding: 5px; }
    .unit-text { font-family: 'Noto Sans TC', sans-serif; font-size: 24px; color: #333; font-weight: 700; line-height: 1.2; overflow: hidden; }

    /* 答題頁 */
    #quiz-page.active { display: block; overflow-y: auto; height: 100%; padding-bottom: 50px; }
    .quiz-card { background: #fff; border-radius: 16px; padding: 20px; margin: 10px auto; max-width: 600px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); text-align: left; }
    .option-btn {
      display: block; width: 100%; padding: 16px; margin: 12px 0; font-size: 19px; text-align: left;
      background: #FAFAFA; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; color: var(--text-dark); line-height: 1.4;
    }
    .option-btn.correct { background: #E6F4EA; border-color: #34A853; color: #1E8E3E; font-weight: bold; }
    .option-btn.wrong { background: var(--wrong-bg); border-color: var(--wrong-color); }
    #feedback-area { display: none; margin-top: 25px; padding: 18px; background: #FFF8E1; border-radius: 12px; border: 1px solid #FFE082; text-align: left; }
    .back-btn { background:none; border:none; font-size:28px; color:#888; cursor:pointer; float:left; padding: 0 10px; }

    /* 精進紀錄頁 */
    #record-page.active { display: block; overflow-y: auto; height: 100%; }
    .record-header { 
      background: #FEEFB3; color: #8B6914; padding: 20px; border-radius: 12px; margin-bottom: 20px; 
      border: 1px solid #FDE073; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .record-list { background: #fff; border-radius: 12px; padding: 10px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .record-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 20px; }
    .record-item:last-child { border-bottom: none; }
    .record-title { font-weight: bold; color: #333; }
    .record-count { font-family: 'Noto Sans TC'; color: #888; font-weight: 500; }
    .record-count.done { color: #E6C75A; font-weight: bold; } 

    /* 圓滿卡彈窗 */
    #cert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .cert-card {
      width: 90%; max-width: 380px; 
      background: radial-gradient(circle, #FFFAF0 0%, #FFF8DC 100%);
      border: 4px solid #D4AF37; border-radius: 16px;
      padding: 30px 20px; text-align: center;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      position: relative;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn { from{transform: scale(0.5); opacity:0;} to{transform: scale(1); opacity:1;} }
    
    .cert-title { font-size: 28px; color: #8B6914; margin-bottom: 10px; font-weight: bold; letter-spacing: 2px; }
    .cert-unit { font-size: 22px; color: #333; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #D4AF37; display: inline-block; padding-bottom: 5px; }
    .cert-name { font-size: 32px; font-family: 'Noto Serif TC', serif; color: #4A4A4A; margin: 15px 0; }
    .cert-id { font-size: 16px; color: #888; font-family: 'Noto Sans TC'; margin-bottom: 20px; }
    .cert-stamp { 
      width: 80px; height: 80px; border: 3px solid #D9534F; color: #D9534F; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; margin: 0 auto; 
      font-size: 20px; font-weight: bold; transform: rotate(-15deg); opacity: 0.8;
    }

    /* Modal */
    .modal-overlay{ position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .modal{ width: 100%; max-width: 340px; background: #fff; border-radius: 14px; padding: 24px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    .modal-title{ font-weight: 700; color: var(--main-color-dark); font-size: 20px; margin-bottom: 12px; }
    .modal-msg{ font-size: 18px; color: #333; margin-bottom: 24px; white-space: pre-wrap; line-height: 1.5; }
    .modal-actions{ text-align: right; }
    .modal-btn{ border: none; padding: 10px 24px; border-radius: 24px; font-size: 16px; cursor: pointer; margin-left: 10px;}
    .modal-btn.cancel{ background: #f0f0f0; color: #666; }
    .modal-btn.ok{ background: var(--main-color-dark); color: #fff; }

  </style>
</head>

<body>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <div id="modal-title" class="modal-title">提示</div>
    <div id="modal-msg" class="modal-msg"></div>
    <div class="modal-actions">
      <button id="modal-cancel" class="modal-btn cancel" style="display:none;">取消</button>
      <button id="modal-ok" class="modal-btn ok">確定</button>
    </div>
  </div>
</div>

<div id="cert-overlay">
  <div class="cert-card">
    <div class="cert-title">圓滿獎勵</div>
    <div class="cert-unit" id="cert-unit-text"></div>
    <div style="font-size:14px; color:#666;">恭喜學員</div>
    <div class="cert-name" id="cert-name-text"></div>
    <div class="cert-id" id="cert-id-text"></div>
    <div class="cert-stamp">功德<br>圓滿</div>
    <div style="margin-top:20px;">
      <button class="btn-main" style="width:150px; padding:10px; font-size:16px; margin:0 auto;" onclick="closeCert()">收下獎勵</button>
    </div>
  </div>
</div>

<div id="login-page" class="page active" style="overflow-y:auto; height:100%;">
  <div style="height:40px;"></div>
  <div class="app-title">金剛經<br>刷題小程序</div>
  <select id="user-class">
    <option value="" disabled selected>請選擇班級</option>
    <option value="太谷一班">太谷一班</option>
    <option value="佛寶一班">佛寶一班</option>
    <option value="教授師">教授師</option>
  </select>
  <input type="text" id="user-id" placeholder="請輸入學號 (必填)">
  <input type="text" id="user-name" placeholder="請輸入姓名/法名">
  <button id="login-btn" class="btn-main sans-font" onclick="login()">開始精進</button>
  <div id="loading-msg" style="margin-top:20px; color:#999; font-size:16px;">正在載入題庫...</div>
</div>

<div id="menu-page" class="page">
  <div style="padding: 15px 10px 5px 10px;">
    <button class="btn-sub" onclick="loadMyProgress()">📊 查看精進紀錄</button>
  </div>
  
  <div id="unit-list"></div>
  
  <div style="padding: 10px;">
    <button class="btn-sub" onclick="endPractice()" style="border:1px solid #ccc; color:#888; font-size:16px;">結束練習</button>
  </div>
</div>

<div id="record-page" class="page">
  <div style="display:flex; align-items:center; margin-bottom:15px;">
    <button class="back-btn" onclick="switchPage('menu-page')">←</button>
    <div style="flex-grow:1; text-align:center; font-weight:bold; font-size:22px; color:#555;">精進紀錄表</div>
    <div style="width:40px;"></div>
  </div>
  
  <div class="record-header">
    <div style="font-size:20px; font-weight:bold; margin-bottom:5px;">目標：</div>
    <div>每個單元圓滿 2 次<br>可獲得圓滿獎勵</div>
  </div>

  <div class="record-list" id="record-list-container">
    <div style="text-align:center; padding:20px; color:#999;">載入中...</div>
  </div>
</div>

<div id="quiz-page" class="page">
  <div style="display:flex; align-items:center; margin-bottom:15px; padding-top:10px;">
    <button class="back-btn" onclick="confirmHome()">←</button>
    <div style="flex-grow:1; text-align:center; font-weight:bold; color:var(--main-color-dark); font-size:20px;" id="quiz-unit-tag"></div>
    <div style="width:40px;"></div>
  </div>
  <div style="text-align:right; color:#888; font-size:14px; margin-right:5px; margin-bottom: 5px;">
    <span id="q-progress"></span>
  </div>
  <div class="quiz-card">
    <div id="question-text" class="sans-font" style="font-size:22px; font-weight:bold; margin-bottom:20px; line-height:1.5;"></div>
    <div id="options-container" class="sans-font"></div>
  </div>
  <div id="feedback-area" class="sans-font">
    <div id="result-title" style="font-weight:bold; font-size:20px; margin-bottom:10px;"></div>
    <div id="correct-ans" style="color:#1E8E3E; margin-bottom:10px; font-size:18px;"></div>
    <div id="explain-text" style="line-height:1.6; color:#555; font-size:18px;"></div>
    <div style="text-align:right; margin-top:20px;">
      <button class="btn-main" style="width:auto; padding:10px 30px; margin:0; font-size:18px;" onclick="nextQuestion()">下一題</button>
    </div>
  </div>
</div>

<script>
  const el = {
    modalOverlay: document.getElementById('modal-overlay'),
    modalTitle: document.getElementById('modal-title'), modalMsg: document.getElementById('modal-msg'),
    modalOk: document.getElementById('modal-ok'), modalCancel: document.getElementById('modal-cancel'),
    loginBtn: document.getElementById('login-btn'), loadingMsg: document.getElementById('loading-msg'),
    userClass: document.getElementById('user-class'), userId: document.getElementById('user-id'), userName: document.getElementById('user-name'),
    unitList: document.getElementById('unit-list'), 
    recordListContainer: document.getElementById('record-list-container'),
    quizUnitTag: document.getElementById('quiz-unit-tag'), qProgress: document.getElementById('q-progress'),
    questionText: document.getElementById('question-text'), optionsContainer: document.getElementById('options-container'),
    feedbackArea: document.getElementById('feedback-area'), resultTitle: document.getElementById('result-title'),
    correctAns: document.getElementById('correct-ans'), explainText: document.getElementById('explain-text'),
    // 圓滿卡
    certOverlay: document.getElementById('cert-overlay'), certUnitText: document.getElementById('cert-unit-text'),
    certNameText: document.getElementById('cert-name-text'), certIdText: document.getElementById('cert-id-text')
  };

  function showModal(message, title="提示"){
    el.modalTitle.innerText = title; el.modalMsg.innerText = message;
    el.modalCancel.style.display = "none"; el.modalOk.onclick = ()=> el.modalOverlay.style.display="none";
    el.modalOverlay.style.display="flex";
  }
  function showConfirm(message, onYes, title="確認"){
    el.modalTitle.innerText = title; el.modalMsg.innerText = message;
    el.modalCancel.style.display="inline-block"; el.modalCancel.onclick = ()=> el.modalOverlay.style.display="none";
    el.modalOk.onclick = ()=>{ el.modalOverlay.style.display="none"; onYes(); };
    el.modalOverlay.style.display="flex";
  }

  let allQuestions = [];
  let currentQuestions = [];
  let currentQIndex = 0;
  let score = 0;
  let userInfo = {};
  let currentUnitName = ""; 

  const UNIT_NAMES = [
    "01 總說", "02 釋經題及譯者", "03 法會因由分第一", "04 善現啟請分第二",
    "05 大乘正宗分第三", "06 妙行無住分第四", "07 如理實見分第五", "08 正信希有分第六"
  ];

  window.onload = function(){
    if(localStorage.getItem('u_name')){
      el.userName.value = localStorage.getItem('u_name') || "";
      el.userClass.value = localStorage.getItem('u_class') || "";
      el.userId.value = localStorage.getItem('u_id') || "";
    }
    google.script.run.withSuccessHandler(data=>{ allQuestions = data || []; el.loadingMsg.style.display="none"; })
      .withFailureHandler(err=>showModal("載入失敗："+err)).getQuestionData();
  };

  function login(){
    const uClass = el.userClass.value; const uId = el.userId.value.trim(); const uNameInput = el.userName.value.trim();
    if(!uClass){ showModal("請選擇班級"); return; }
    if(!uId){ showModal("請輸入學號"); return; }
    
    const originalText = el.loginBtn.innerText; el.loginBtn.innerText="驗證中..."; el.loginBtn.disabled=true;

    google.script.run.withSuccessHandler(res=>{
      el.loginBtn.innerText = originalText; el.loginBtn.disabled=false;
      if(res && res.error){ showModal(res.error); return; }
      if(res && res.valid){
        const finalName = res.name || uNameInput || "學員";
        userInfo = { class: uClass, name: finalName, id: uId };
        localStorage.setItem('u_class', uClass); localStorage.setItem('u_name', finalName); localStorage.setItem('u_id', uId);
        renderMenu();
        switchPage('menu-page');
      }else{ showModal("找不到學號「" + uId + "」，請確認輸入是否正確。"); }
    }).withFailureHandler(err=>{
      el.loginBtn.innerText = originalText; el.loginBtn.disabled=false; showModal("連線錯誤："+err);
    }).verifyStudentId(uId);
  }

  // 結束練習
  function endPractice() {
    switchPage('login-page');
  }

  function renderMenu(){
    el.unitList.innerHTML="";
    UNIT_NAMES.forEach((unit, idx)=>{
      const m = String(unit).match(/^(\d{2})\s*(.*)$/);
      const no = m ? m[1] : String(idx+1).padStart(2,"0");
      const title = m ? (m[2] || unit) : unit;
      const card = document.createElement("div");
      card.className = "unit-card";
      card.innerHTML = `<div class="unit-head"><div class="unit-no">${no}</div></div><div class="unit-body"><div class="unit-text">${title}</div></div>`;
      card.onclick = () => startQuiz(unit);
      el.unitList.appendChild(card);
    });
  }

  function startQuiz(unitName){
    currentUnitName = unitName;
    currentQuestions = allQuestions.filter(q=>String(q.unit).includes(unitName));
    if(currentQuestions.length===0){ showModal("此單元無題目"); return; }
    currentQuestions.sort(()=>Math.random()-0.5);
    currentQIndex=0; score=0;
    switchPage('quiz-page');
    el.quizUnitTag.innerText=unitName;
    renderQuestion();
  }

  function renderQuestion(){
    const q=currentQuestions[currentQIndex];
    el.qProgress.innerText=`${currentQIndex+1}/${currentQuestions.length}`;
    el.questionText.innerText=q.qText;
    el.feedbackArea.style.display="none";
    el.optionsContainer.innerHTML="";
    q.options.forEach((opt,idx)=>{
      const b=document.createElement("button"); b.className="option-btn";
      b.innerText=(idx+1)+". "+opt; b.onclick=()=>checkAns(idx+1,q.ans,q.explain,b);
      el.optionsContainer.appendChild(b);
    });
  }

  // ★ 漂亮版 + 無敵判斷邏輯
  function checkAns(sel, ans, exp, btn){
    document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
    
    // 轉字串、去空白
    let s = String(sel).trim();
    let a = String(ans).trim();

    // 處理全形數字
    a = a.replace(/[\uff10-\uff19]/g, m => String.fromCharCode(m.charCodeAt(0) - 0xfee0));
    // 處理是非題
    if(a==="非"||a==="否"||a==="X"||a==="❌") a="2";
    if(a==="是"||a==="O"||a==="⭕") a="1";

    const ok = (s == a);

    if(ok){
      btn.classList.add('correct');
      score++;
      el.resultTitle.innerText="⭕ 答對了";
      el.resultTitle.style.color="#1E8E3E";
    }else{
      btn.classList.add('wrong');
      el.resultTitle.innerText="❌ 答錯了";
      el.resultTitle.style.color="#D9534F";
      
      const allBtns = document.querySelectorAll('.option-btn');
      // 標記正確答案
      if(!isNaN(a)){
         const correctIdx = parseInt(a) - 1;
         if(allBtns[correctIdx]) allBtns[correctIdx].classList.add('correct');
      }
    }

    el.correctAns.innerText = ok ? "" : "正解：" + ans;
    el.explainText.innerText = exp || "無解析";
    el.feedbackArea.style.display = "block";
  }

  function nextQuestion(){
    currentQIndex++;
    if(currentQIndex<currentQuestions.length){ renderQuestion(); }
    else{
      const finalScore=Math.round(score/currentQuestions.length*100);
      showModal(`得分：${finalScore}`,"測驗結束");
      
      google.script.run.withSuccessHandler(res=>{
         if(res.status === 'success'){
           if(res.passCount === 2){ showCert(currentUnitName); }
         }
         switchPage('menu-page');
      }).saveUserProgress(userInfo.id,userInfo.name, UNIT_NAMES.indexOf(currentUnitName), finalScore, userInfo.class);
    }
  }

  function loadMyProgress() {
    switchPage('record-page');
    el.recordListContainer.innerHTML = '<div style="text-align:center; padding:20px;">載入中...</div>';
    
    google.script.run.withSuccessHandler(counts => {
      let html = "";
      UNIT_NAMES.forEach((unit, idx) => {
        let count = counts[idx+1] || 0;
        let displayCount = count > 2 ? 2 : count;
        let countClass = count >= 2 ? "record-count done" : "record-count";
        html += `
          <div class="record-item">
            <div class="record-title">${unit}</div>
            <div class="${countClass}">${displayCount} / 2</div>
          </div>
        `;
      });
      el.recordListContainer.innerHTML = html;
    }).getStudentProgress(userInfo.id, userInfo.class);
  }

  function showCert(unitName) {
    el.certUnitText.innerText = unitName;
    el.certNameText.innerText = userInfo.name;
    el.certIdText.innerText = "學號：" + userInfo.id;
    el.certOverlay.style.display = 'flex';
  }
  function closeCert() { el.certOverlay.style.display = 'none'; }

  function confirmHome(){ showConfirm("要放棄進度返回首頁嗎？", ()=> { switchPage('menu-page'); });}
  function switchPage(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>

</body>
</html>
